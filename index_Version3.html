<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="ie=edge">
  <meta http-equiv="Content-Security-Policy" content="default-src *; script-src * 'unsafe-inline' 'unsafe-eval'; style-src * 'unsafe-inline'; img-src * data: blob:; connect-src *; font-src * data:;">
  
  <title>F1 Pit Wall — Race Weekend Summarizer</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Barlow+Condensed:wght@300;400;600&family=Barlow:wght@300;400&display=swap" rel="stylesheet">
  
  <style>
    :root {
      --red: #e10600;
      --red-dim: #8a0300;
      --black: #0a0a0a;
      --dark: #111111;
      --card: #181818;
      --border: #2a2a2a;
      --text: #f0f0f0;
      --muted: #888;
      --gold: #ffd700;
      --green: #00d2be;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      width: 100%;
      height: 100%;
      background: var(--black);
      color: var(--text);
      font-family: 'Barlow', sans-serif;
    }

    header {
      background: var(--dark);
      border-bottom: 2px solid var(--red);
      padding: 18px 28px;
      display: flex;
      align-items: center;
      gap: 16px;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 4px 12px rgba(225, 6, 0, 0.15);
    }
    .logo-flag {
      display: flex;
      gap: 2px;
      align-items: center;
    }
    .flag-stripe { width: 6px; height: 32px; border-radius: 2px; }
    .flag-stripe:nth-child(1) { background: var(--red); }
    .flag-stripe:nth-child(2) { background: #fff; }
    .flag-stripe:nth-child(3) { background: var(--red); }
    header h1 {
      font-family: 'Orbitron', monospace;
      font-weight: 900;
      font-size: 1.3rem;
      letter-spacing: 3px;
      color: var(--red);
      text-transform: uppercase;
    }
    header span.sub {
      font-family: 'Barlow Condensed', sans-serif;
      color: var(--muted);
      letter-spacing: 2px;
      font-size: 0.75rem;
      margin-top: 2px;
    }
    .header-text { display: flex; flex-direction: column; }

    .tab-bar {
      display: flex;
      background: var(--dark);
      border-bottom: 1px solid var(--border);
      padding: 0 16px;
      gap: 4px;
    }
    .tab {
      padding: 12px 22px;
      cursor: pointer;
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 600;
      letter-spacing: 2px;
      font-size: 0.85rem;
      text-transform: uppercase;
      color: var(--muted);
      border-bottom: 3px solid transparent;
      transition: all 0.2s;
      user-select: none;
      border: none;
      background: none;
    }
    .tab:hover { color: var(--text); }
    .tab.active { color: var(--red); border-bottom-color: var(--red); }

    .main {
      display: grid;
      grid-template-columns: 1fr 360px;
      gap: 0;
      height: calc(100vh - 110px);
    }

    .chat-panel {
      display: flex;
      flex-direction: column;
      border-right: 1px solid var(--border);
    }
    .chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 24px 28px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      scrollbar-width: thin;
      scrollbar-color: var(--border) transparent;
    }
    .chat-messages::-webkit-scrollbar { width: 4px; }
    .chat-messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    .msg {
      display: flex;
      gap: 12px;
      animation: fadeUp 0.3s ease;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .msg.user { flex-direction: row-reverse; }
    .avatar {
      width: 36px; height: 36px;
      border-radius: 50%;
      flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      font-family: 'Orbitron', monospace;
      font-size: 0.65rem;
      font-weight: 700;
    }
    .avatar.bot { background: var(--red); color: #fff; }
    .avatar.user-av { background: var(--green); color: #000; }

    .bubble {
      max-width: 75%;
      padding: 12px 16px;
      border-radius: 12px;
      font-size: 0.9rem;
      line-height: 1.6;
      word-wrap: break-word;
    }
    .msg.bot .bubble {
      background: var(--card);
      border: 1px solid var(--border);
      border-top-left-radius: 2px;
    }
    .msg.user .bubble {
      background: var(--red-dim);
      border: 1px solid var(--red);
      border-top-right-radius: 2px;
    }

    .typing-indicator { display: flex; gap: 4px; align-items: center; padding: 4px 0; }
    .typing-indicator span {
      width: 7px; height: 7px;
      background: var(--red);
      border-radius: 50%;
      animation: bounce 1.2s infinite;
    }
    .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
    .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce {
      0%, 60%, 100% { transform: translateY(0); }
      30% { transform: translateY(-6px); }
    }

    .input-bar {
      padding: 16px 20px;
      background: var(--dark);
      border-top: 1px solid var(--border);
      display: flex;
      gap: 10px;
      align-items: flex-end;
    }
    .input-bar textarea {
      flex: 1;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-family: 'Barlow', sans-serif;
      font-size: 0.9rem;
      padding: 10px 14px;
      resize: none;
      max-height: 120px;
      min-height: 42px;
      outline: none;
      transition: border-color 0.2s;
      line-height: 1.5;
    }
    .input-bar textarea:focus { border-color: var(--red); }
    .input-bar textarea::placeholder { color: var(--muted); }
    .send-btn {
      background: var(--red);
      border: none;
      color: #fff;
      padding: 10px 18px;
      border-radius: 8px;
      font-family: 'Orbitron', monospace;
      font-size: 0.7rem;
      letter-spacing: 1.5px;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
      height: 42px;
      text-transform: uppercase;
    }
    .send-btn:hover { background: #ff1e00; }
    .send-btn:active { transform: scale(0.97); }
    .send-btn:disabled { background: var(--border); cursor: not-allowed; }

    .sidebar {
      background: var(--dark);
      overflow-y: auto;
      padding: 20px 18px;
      display: flex;
      flex-direction: column;
      gap: 18px;
    }
    .sidebar-section h4 {
      font-family: 'Orbitron', monospace;
      font-size: 0.6rem;
      letter-spacing: 2.5px;
      color: var(--muted);
      text-transform: uppercase;
      margin-bottom: 10px;
      padding-bottom: 6px;
      border-bottom: 1px solid var(--border);
    }
    .quick-btn {
      display: block;
      width: 100%;
      text-align: left;
      background: var(--card);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 9px 12px;
      border-radius: 6px;
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 0.82rem;
      cursor: pointer;
      transition: all 0.15s;
      margin-bottom: 6px;
    }
    .quick-btn:hover { border-color: var(--red); color: var(--red); }

    .race-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 8px;
      overflow: hidden;
    }
    .race-card-header {
      background: var(--red);
      padding: 8px 12px;
      font-family: 'Orbitron', monospace;
      font-size: 0.65rem;
      letter-spacing: 2px;
      color: #fff;
      text-transform: uppercase;
    }
    .race-card-body { padding: 12px; }
    .race-info-row {
      display: flex;
      justify-content: space-between;
      font-size: 0.82rem;
      padding: 4px 0;
      border-bottom: 1px solid var(--border);
    }
    .race-info-row:last-child { border-bottom: none; }
    .race-info-row span:first-child { color: var(--muted); }
    .race-info-row span:last-child { font-weight: 600; }

    .loading-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.7);
      z-index: 200;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 16px;
    }
    .loading-overlay.show { display: flex; }
    .spinner {
      width: 48px; height: 48px;
      border: 3px solid var(--border);
      border-top-color: var(--red);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    @media (max-width: 700px) {
      .main { grid-template-columns: 1fr; }
      .sidebar { display: none; }
    }
  </style>
</head>
<body>

<div class="loading-overlay" id="loader">
  <div class="spinner"></div>
  <span style="font-family:'Barlow Condensed',sans-serif;letter-spacing:2px;color:var(--muted);font-size:0.85rem;">FETCHING FROM PIT WALL...</span>
</div>

<header>
  <div class="logo-flag">
    <div class="flag-stripe"></div>
    <div class="flag-stripe"></div>
    <div class="flag-stripe"></div>
  </div>
  <div class="header-text">
    <h1>F1 Pit Wall</h1>
    <span class="sub">Race Weekend Summarizer</span>
  </div>
</header>

<div class="tab-bar">
  <button class="tab active" data-day="friday" onclick="switchDay('friday')">🏎 Friday — FP</button>
  <button class="tab" data-day="saturday" onclick="switchDay('saturday')">⏱ Saturday — Quali</button>
  <button class="tab" data-day="sunday" onclick="switchDay('sunday')">🏁 Sunday — Race</button>
  <button class="tab" data-day="weekend" onclick="switchDay('weekend')">📋 Full Weekend</button>
</div>

<div class="main">
  <div class="chat-panel">
    <div class="chat-messages" id="chatMessages"></div>
    <div class="input-bar">
      <textarea id="userInput" placeholder="Ask about FP, quali, race results, fastest laps..." rows="1"
        onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
      <button class="send-btn" id="sendBtn" onclick="sendMessage()">Send</button>
    </div>
  </div>

  <div class="sidebar">
    <div class="sidebar-section">
      <h4>Quick Summaries</h4>
      <button class="quick-btn" onclick="quickAsk('Give me the full Friday FP1 and FP2 summary')">🔧 Friday Practice</button>
      <button class="quick-btn" onclick="quickAsk('Summarize qualifying — grid positions, fastest laps, any dramas')">⏱ Saturday Qualifying</button>
      <button class="quick-btn" onclick="quickAsk('Full race summary — winner, podium, key battles, retirements')">🏁 Sunday Race</button>
      <button class="quick-btn" onclick="quickAsk('Give me the full race weekend summary — FP, quali, and race')">📋 Whole Weekend</button>
    </div>
    <div class="sidebar-section">
      <h4>Dig Deeper</h4>
      <button class="quick-btn" onclick="quickAsk('Who set the fastest lap in the race and what was the time?')">⚡ Fastest Lap</button>
      <button class="quick-btn" onclick="quickAsk('Explain the tire strategy used by the top 3 finishers')">🔄 Tire Strategy</button>
      <button class="quick-btn" onclick="quickAsk('Any safety cars, red flags, or incidents this weekend?')">🚨 Safety Cars</button>
      <button class="quick-btn" onclick="quickAsk('How did the championship standings change after this race?')">🏆 Championship</button>
      <button class="quick-btn" onclick="quickAsk('Who were the biggest overtakes or battles of the race?')">💥 Key Battles</button>
      <button class="quick-btn" onclick="quickAsk('Any penalties, protests, or stewards decisions this weekend?')">⚖️ Stewards</button>
    </div>
    <div class="sidebar-section">
      <h4>Weekend Format</h4>
      <div class="race-card">
        <div class="race-card-header">Standard Race Weekend</div>
        <div class="race-card-body">
          <div class="race-info-row"><span>Friday</span><span>FP1 + FP2</span></div>
          <div class="race-info-row"><span>Saturday</span><span>FP3 + Quali</span></div>
          <div class="race-info-row"><span>Sunday</span><span>Race (≈90min)</span></div>
        </div>
      </div>
      <div class="race-card" style="margin-top:10px">
        <div class="race-card-header" style="background:#7a3a00">Sprint Weekend</div>
        <div class="race-card-body">
          <div class="race-info-row"><span>Friday</span><span>FP1 + Sprint Quali</span></div>
          <div class="race-info-row"><span>Saturday</span><span>Sprint + Quali</span></div>
          <div class="race-info-row"><span>Sunday</span><span>Race (≈90min)</span></div>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
let currentDay = 'weekend';
let isLoading = false;
const API_BASE = window.location.origin;

function switchDay(day) {
  currentDay = day;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelector(`[data-day="${day}"]`).classList.add('active');
  
  fetch(`${API_BASE}/api/set-day`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ day: day })
  }).catch(err => console.error('Set day error:', err));
}

function addMessage(role, content) {
  const container = document.getElementById('chatMessages');
  const div = document.createElement('div');
  div.className = `msg ${role === 'user' ? 'user' : 'bot'}`;

  const av = document.createElement('div');
  av.className = `avatar ${role === 'user' ? 'user-av' : 'bot'}`;
  av.textContent = role === 'user' ? 'YOU' : 'PW';

  const bubble = document.createElement('div');
  bubble.className = 'bubble';
  bubble.textContent = content;

  div.appendChild(av);
  div.appendChild(bubble);
  container.appendChild(div);
  container.scrollTop = container.scrollHeight;
}

function showTyping() {
  const container = document.getElementById('chatMessages');
  const div = document.createElement('div');
  div.className = 'msg bot';
  div.id = 'typingIndicator';
  div.innerHTML = `
    <div class="avatar bot">PW</div>
    <div class="bubble"><div class="typing-indicator"><span></span><span></span><span></span></div></div>
  `;
  container.appendChild(div);
  container.scrollTop = container.scrollHeight;
}

function hideTyping() {
  const el = document.getElementById('typingIndicator');
  if (el) el.remove();
}

async function sendMessage(customText) {
  const input = document.getElementById('userInput');
  const text = customText || input.value.trim();
  if (!text || isLoading) return;

  if (!customText) input.value = '';
  input.style.height = 'auto';

  addMessage('user', text);
  showTyping();
  isLoading = true;
  document.getElementById('sendBtn').disabled = true;

  try {
    const response = await fetch(`${API_BASE}/api/query`, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Accept': 'application/json'
      },
      body: JSON.stringify({ query: text }),
      mode: 'cors'
    });

    const data = await response.json();
    hideTyping();

    if (data.success) {
      addMessage('bot', data.response);
    } else {
      addMessage('bot', `⚠️ ${data.error || 'Unable to fetch information'}`);
    }
  } catch (err) {
    hideTyping();
    console.error('Request error:', err);
    addMessage('bot', `⚠️ Connection error: ${err.message}`);
  }

  isLoading = false;
  document.getElementById('sendBtn').disabled = false;
}

function quickAsk(text) {
  sendMessage(text);
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 120) + 'px';
}

window.addEventListener('load', () => {
  addMessage('bot', '🏎️ Welcome to the Pit Wall! Pick a day tab above, use the quick buttons on the right, or ask me anything about F1!');
});
</script>

</body>
</html>
